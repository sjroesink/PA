services:
  hermes:
    image: ghcr.io/sjroesink/pa:latest
    container_name: hermes-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HERMES_HOME=/data/hermes
      - TERMINAL_ENV=local
      - ENABLE_SSH=true
    volumes:
      - /mnt/user/appdata/hermes-agent:/data/hermes
    ports:
      - "8022:22"
