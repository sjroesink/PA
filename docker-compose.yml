services:
  hermes:
    image: ghcr.io/sjroesink/pa:latest
    container_name: hermes-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HERMES_HOME=/data/hermes
      - TERMINAL_ENV=local
      - ENABLE_SSH=true
    volumes:
      - hermes-data:/data/hermes
      - hermes-ssh:/data/hermes/.ssh
    ports:
      - "8022:22"

volumes:
  hermes-data:
    driver: local
  hermes-ssh:
    driver: local
